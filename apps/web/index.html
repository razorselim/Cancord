<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CANCORD | encrypted terminal</title>
  <link rel="stylesheet" href="./styles/dark.css" />
  <link rel="icon" type="image/x-icon" href="./favicon.jpg">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body class="theme-terminal">

  <!-- GİRİŞ MODALI - TERMINAL USULÜ -->
  <div id="authModal" class="auth-modal">
    <div class="terminal-frame">
      <div class="terminal-title-bar">
        <div class="terminal-dots">
          <span></span><span></span><span></span>
        </div>
        <span class="terminal-title">cancord@login:~</span>
      </div>
      <div class="terminal-content">
        <div class="terminal-line">
          <span>$></span>
          <span>cancord terminal v2.0</span>
        </div>

        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">login</button>
          <button class="auth-tab" data-tab="register">register</button>
        </div>

        <div id="loginPanel" class="auth-panel active">
          <input type="text" id="loginUsername" placeholder="username" class="auth-input">
          <input type="password" id="loginPassword" placeholder="password" class="auth-input">
          <button id="loginBtn" class="auth-btn">[ ENTER ]</button>
          <div id="loginError" class="auth-error"></div>
        </div>

        <div id="registerPanel" class="auth-panel">
          <input type="text" id="regUsername" placeholder="username (min 3)" class="auth-input">
          <input type="password" id="regPassword" placeholder="password (min 4)" class="auth-input">
          <button id="registerBtn" class="auth-btn">[ REGISTER ]</button>
          <div id="regError" class="auth-error"></div>
        </div>
      </div>
      <div class="terminal-footer">
        <span>● SECURE CONNECTION</span>
        <span>AES-256</span>
      </div>
    </div>
  </div>

  <div class="app">
    
    <!-- SOL PANEL -->
    <aside class="sidebar">
      <div class="logo">
        <span class="logo-symbol">✦</span>
        <span class="logo-text">CANCORD</span>
        <span class="logo-version">v1.0</span>
      </div>
      
      <!-- TEMA SEÇİCİ -->
      <div class="theme-panel">
        <div class="theme-label">⌘ THEMES</div>
        <div class="theme-buttons">
          <button class="theme-btn" data-theme="terminal">01</button>
          <button class="theme-btn" data-theme="white">02</button>
          <button class="theme-btn" data-theme="aviation">03</button>
          <button class="theme-btn" data-theme="casino">04</button>
        </div>
        <div class="theme-names">
          <span>TERMINAL</span>
          <span>WHITE</span>
          <span>AVIATION</span>
          <span>CASINO</span>
        </div>
      </div>
      
      <div class="divider"></div>
      
      <div class="stats">
        <div class="stat-item">
          <span class="stat-dot"></span>
          <span id="userCount">0</span>
          <span>online</span>
        </div>
        <div class="stat-item">
          <span>🔒</span>
          <span>encrypted</span>
        </div>
      </div>
      
      <div id="users" class="user-list"></div>
      
      <div class="sidebar-footer">
        <div class="connection">
          <span class="pulse"></span>
          <span>SECURE</span>
        </div>
      </div>
    </aside>

    <!-- ORTA ALAN -->
    <main class="main">
      <div class="screen-header">
        <span>▶ SCREEN_SHARE</span>
        <span class="peer-badge">P2P</span>
      </div>
      
      <div id="screenContainer">
        <video id="screenVideo" autoplay muted></video>
        <div class="no-signal">
          <span class="no-signal-text">NO SIGNAL</span>
          <span class="no-signal-sub">waiting for stream...</span>
        </div>
      </div>

      <div class="controls">
        <button id="micBtn" class="ctrl-btn">
          <span>🎤</span>
          <span>MIC</span>
        </button>
        <button id="screenBtn" class="ctrl-btn">
          <span>🖥️</span>
          <span>SHARE</span>
        </button>
      </div>
      
      <div class="sysinfo">
        <span>● channel: room-1</span>
        <span id="timestamp"></span>
      </div>
    </main>

    <!-- SAĞ PANEL / CHAT -->
    <section class="chat">
      <div class="chat-header">
        <span>📡 CHAT</span>
        <span class="encrypt-badge">AES-256</span>
      </div>
      <div id="messages" class="messages"></div>
      <div class="input-wrapper">
        <span class="input-cursor">&gt;</span>
        <input id="chatInput" type="text" placeholder="type message..." autocomplete="off">
        <button id="sendBtn" class="send-btn">↵</button>
      </div>
      <div class="chat-footer">
        <span>end-to-end encrypted</span>
      </div>
    </section>

  </div>

  

  <!-- Arkaplan Müziği -->
<audio id="bgMusic" loop style="display:none;">
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

  <script type="module" src="./main.js"></script>
  <script>
    // Müzik kontrolü - sayfaya ilk tıklamada başlasın
    const music = document.getElementById('bgMusic');
    music.volume = 0.15;
    
    function startMusic() {
      music.play().catch(e => console.log('Müzik çalışmadı'));
      document.removeEventListener('click', startMusic);
      document.removeEventListener('keydown', startMusic);
    }
    
    document.addEventListener('click', startMusic);
    document.addEventListener('keydown', startMusic);
  </script>
</body>
</html>
